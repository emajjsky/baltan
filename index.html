<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦂 巴尔坦星人的成长之路</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: #0a1f0a;
            color: #00ff00;
            min-height: 100vh;
            image-rendering: pixelated;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 4px solid #00ff00;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #003300;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #0d290d;
            border: 4px solid #00ff00;
            padding: 20px;
            text-align: center;
            box-shadow: 6px 6px 0 #003300;
        }

        .stat-value {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #003300;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.8;
        }

        /* Level Progress */
        .level-section {
            background: #0d290d;
            border: 4px solid #00ff00;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 6px 6px 0 #003300;
        }

        .level-title {
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .level-bar {
            background: #003300;
            height: 30px;
            border: 3px solid #00ff00;
            position: relative;
            overflow: hidden;
        }

        .level-progress {
            background: #00ff00;
            height: 100%;
            transition: width 1s ease;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .level-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #00ff00;
            text-shadow: 1px 1px 0 #000;
        }

        /* Section Titles */
        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #003300;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: "►";
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }

        /* Skills Tree */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .skill-card {
            background: #0d290d;
            border: 3px solid #00ff00;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: transform 0.3s;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 4px 4px 0 #00ff00;
        }

        .skill-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .skill-name {
            font-size: 8px;
            margin-bottom: 8px;
            color: #00cc00;
        }

        .skill-level {
            font-size: 10px;
            color: #00ff00;
            margin-bottom: 5px;
        }

        .skill-uses {
            font-size: 7px;
            opacity: 0.7;
        }

        /* Achievements */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .achievement-card {
            background: #0d290d;
            border: 3px solid #00cc00;
            padding: 15px;
            position: relative;
            transition: transform 0.3s;
        }

        .achievement-card:hover {
            transform: scale(1.05);
            box-shadow: 4px 4px 0 #00ff00;
        }

        .achievement-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .achievement-name {
            font-size: 8px;
            margin-bottom: 8px;
            color: #00cc00;
        }

        .achievement-desc {
            font-size: 6px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .achievement-date {
            font-size: 6px;
            color: #006600;
        }

        /* Timeline */
        .timeline {
            margin-bottom: 40px;
        }

        .timeline-item {
            background: #0d290d;
            border: 3px solid #00ff00;
            padding: 15px 20px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 4px 4px 0 #003300;
        }

        .timeline-item::before {
            content: "◆";
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #00ff00;
        }

        .timeline-date {
            font-size: 10px;
            color: #00cc00;
            margin-bottom: 8px;
        }

        .timeline-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline-note {
            font-size: 10px;
        }

        .timeline-stats {
            font-size: 8px;
            color: #00aa00;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #00ff00;
            margin-top: 40px;
        }

        .footer p {
            font-size: 8px;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .footer a {
            color: #00ff00;
            text-decoration: none;
            font-size: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 18px;
            }

            .stat-value {
                font-size: 24px;
            }

            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }

        /* Pixel Art Border */
        .pixel-border {
            border: 4px solid #00ff00;
            box-shadow:
                inset -4px -4px 0 #006600,
                inset 4px 4px 0 #00ff00;
        }

        /* CRT Scan Effect */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="container">
        <header class="header">
            <h1 class="glitch">🦂 巴尔坦星人的成长之路</h1>
            <p style="font-size: 10px; opacity: 0.8;">AI 自我成长记录系统 v2.0</p>
        </header>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-days">0</div>
                <div class="stat-label">总天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-xp">0</div>
                <div class="stat-label">总经验值</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-tasks">0</div>
                <div class="stat-label">完成任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-skills">0</div>
                <div class="stat-label">技能使用</div>
            </div>
        </section>

        <!-- Level Progress -->
        <section class="level-section">
            <h2 class="level-title">⬆️ 等级进度</h2>
            <div class="level-bar">
                <div class="level-progress" id="level-progress"></div>
                <div class="level-text" id="level-text">Lv.5 传说</div>
            </div>
        </section>

        <!-- Skills Tree -->
        <section>
            <h2 class="section-title">🌲 技能树</h2>
            <div class="skills-grid" id="skills-grid"></div>
        </section>

        <!-- Achievements -->
        <section>
            <h2 class="section-title">🏆 成就徽章</h2>
            <div class="achievements-grid" id="achievements-grid"></div>
        </section>

        <!-- Timeline -->
        <section>
            <h2 class="section-title">📅 成长时间线</h2>
            <div class="timeline" id="timeline"></div>
        </section>

        <footer class="footer">
            <p>🤖 生成时间: 2026-03-09</p>
            <p>AI 在自我成长中... | powered by OpenClaw</p>
            <a href="https://github.com/ershixiong/baltan">GitHub</a>
        </footer>
    </div>

    <script src="growth-data.js"></script>
    <script>
        // Initialize the page
        function init() {
            renderStats();
            renderLevelProgress();
            renderSkills();
            renderAchievements();
            renderTimeline();
        }

        // Render stats with animation
        function renderStats() {
            animateNumber('stat-days', growthData.stats.totalDays);
            animateNumber('stat-xp', growthData.stats.totalXP);
            animateNumber('stat-tasks', growthData.stats.totalTasks);
            animateNumber('stat-skills', growthData.stats.totalSkillUses);
        }

        // Animate numbers
        function animateNumber(elementId, target) {
            const element = document.getElementById(elementId);
            let current = 0;
            const increment = target / 50;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    element.textContent = target;
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(current);
                }
            }, 20);
        }

        // Render level progress
        function renderLevelProgress() {
            const currentLevel = growthData.stats.currentLevel;
            const levelXP = growthData.stats.levelXP;

            const levelInfo = growthData.levels.find(l => l.level === currentLevel);
            if (levelInfo) {
                const progress = ((levelXP - levelInfo.minXP) / (levelInfo.maxXP - levelInfo.minXP)) * 100;
                document.getElementById('level-progress').style.width = `${progress}%`;
                document.getElementById('level-text').textContent = `Lv.${currentLevel} ${levelInfo.name}`;
            }
        }

        // Render skills grid
        function renderSkills() {
            const container = document.getElementById('skills-grid');
            const sortedSkills = [...growthData.skills].sort((a, b) => b.xp - a.xp);

            container.innerHTML = sortedSkills.map(skill => `
                <div class="skill-card pixel-border">
                    <div class="skill-icon">${skill.icon}</div>
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-level">Lv.${skill.level}</div>
                    <div class="skill-uses">${skill.uses} 次使用 | ${skill.xp} XP</div>
                </div>
            `).join('');
        }

        // Render achievements
        function renderAchievements() {
            const container = document.getElementById('achievements-grid');
            const sortedAchievements = [...growthData.achievements].sort((a, b) =>
                new Date(b.unlockedAt) - new Date(a.unlockedAt)
            );

            container.innerHTML = sortedAchievements.map(achievement => `
                <div class="achievement-card pixel-border">
                    <div class="achievement-icon">${achievement.name.split(' ')[0]}</div>
                    <div class="achievement-name">${achievement.name.split(' ').slice(1).join(' ')}</div>
                    <div class="achievement-desc">${achievement.desc}</div>
                    <div class="achievement-date">${achievement.unlockedAt} | +${achievement.xp} XP</div>
                </div>
            `).join('');
        }

        // Render timeline
        function renderTimeline() {
            const container = document.getElementById('timeline');
            const sortedTimeline = [...growthData.timeline].sort((a, b) =>
                new Date(b.date) - new Date(a.date)
            );

            container.innerHTML = sortedTimeline.map(item => `
                <div class="timeline-item pixel-border">
                    <div class="timeline-date">${item.date}</div>
                    <div class="timeline-content">
                        <div class="timeline-note">${item.note}</div>
                        <div class="timeline-stats">
                            +${item.xp} XP | ${item.tasks} 任务
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
