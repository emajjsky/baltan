<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>巴尔坦星人 - AI成长记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
    }
    
    :root {
      --primary: #4ade80;
      --primary-dark: #22c55e;
      --bg-dark: #0d1f12;
      --bg-card: #163a1f;
      --text: #ecfdf5;
      --accent: #fbbf24;
    }
    
    body {
      background: var(--bg-dark);
      color: var(--text);
      background-image:
        linear-gradient(rgba(74, 222, 128, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 222, 128, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    .pixel-border {
      border: 4px solid var(--primary);
      box-shadow:
        4px 4px 0 var(--primary-dark),
        inset 0 0 0 4px var(--bg-dark);
    }
    
    .pixel-btn {
      background: var(--primary);
      color: var(--bg-dark);
      border: 4px solid var(--primary-dark);
      box-shadow:
        4px 4px 0 var(--primary-dark),
        inset -4px -4px 0 rgba(0,0,0,0.2);
      transition: all 0.1s;
    }
    
    .pixel-btn:hover {
      transform: translate(2px, 2px);
      box-shadow:
        2px 2px 0 var(--primary-dark),
        inset -2px -2px 0 rgba(0,0,0,0.2);
    }
    
    .skill-bar {
      background: var(--bg-dark);
      border: 3px solid var(--primary);
      height: 24px;
    }
    
    .skill-progress {
      background: var(--primary);
      height: 100%;
      transition: width 0.5s;
    }
    
    .achievement-badge {
      width: 64px;
      height: 64px;
      background: var(--bg-card);
      border: 3px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .blink {
      animation: blink 1s infinite;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 8px;
      width: 16px;
      height: 16px;
      background: var(--primary);
      border: 3px solid var(--bg-dark);
    }
    
    .skill-tree-node {
      width: 80px;
      height: 80px;
      background: var(--bg-card);
      border: 3px solid var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      padding: 4px;
      position: relative;
    }
    
    .skill-tree-node.unlocked {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--bg-dark);
    }
    
    .skill-line {
      height: 3px;
      background: var(--primary);
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 3px solid var(--primary);
      padding: 16px;
      text-align: center;
    }
    
    .level-badge {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: var(--bg-dark);
      padding: 8px 16px;
      border: 3px solid #d97706;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    const data = {
      stats: {
        level: 4,
        levelName: "大师",
        xp: 1450,
        totalXP: 1000,
        xpToNext: 5000,
        sessions: 11,
        tasks: 13,
        skillUses: 44,
        days: 4,
        abilities: {
          attack: 5,
          defense: 4,
          intelligence: 6,
          technology: 14,
          social: 0
        }
      },
      skills: [
        { name: "exec", level: 2, xp: 150, uses: 15, max: 50 },
        { name: "process", level: 2, xp: 130, uses: 13, max: 50 },
        { name: "read", level: 2, xp: 120, uses: 12, max: 50 },
        { name: "write", level: 1, xp: 70, uses: 7, max: 50 },
        { name: "edit", level: 1, xp: 40, uses: 4, max: 50 },
        { name: "browser", level: 1, xp: 30, uses: 3, max: 50 },
        { name: "feishu_doc", level: 1, xp: 30, uses: 3, max: 50 },
        { name: "message", level: 1, xp: 30, uses: 3, max: 50 },
        { name: "cron", level: 1, xp: 20, uses: 2, max: 50 },
        { name: "sessions_list", level: 1, xp: 10, uses: 1, max: 50 },
        { name: "sessions_history", level: 1, xp: 10, uses: 1, max: 50 }
      ],
      achievements: [
        { id: "first_session", icon: "🌱", name: "初次启程", desc: "首次记录成长", unlocked: true },
        { id: "skill_learner", icon: "📚", name: "技能初学者", desc: "使用技能10次", unlocked: true },
        { id: "task_master", icon: "🎯", name: "任务完成者", desc: "完成5个任务", unlocked: true },
        { id: "daily_warrior", icon: "🔄", name: "连续助手", desc: "连续2天记录", unlocked: true },
        { id: "baltan_elite", icon: "🦂", name: "巴尔坦精英", desc: "累计1000 XP", unlocked: true },
        { id: "skill_expert", icon: "⚡", name: "技能专家", desc: "使用技能50次", unlocked: false },
        { id: "galaxy_explorer", icon: "🌌", name: "银河探索者", desc: "解锁10个成就", unlocked: false },
        { id: "master_tactician", icon: "♟️", name: "战术大师", desc: "完成20个任务", unlocked: false },
        { id: "tech_evolution", icon: "🔬", name: "科技进化", desc: "掌握5个技能Lv.3", unlocked: false },
        { id: "baltan_sage", icon: "👑", name: "巴尔坦贤者", desc: "累计5000 XP", unlocked: false }
      ],
      timeline: [
        { date: "2026-03-05", xp: 620, tasks: 5, desc: "AI成长记录任务 + 4次公众号检查" },
        { date: "2026-03-02", xp: 280, tasks: 6, desc: "微信公众号监控系统开发与部署" },
        { date: "2026-02-24", xp: 170, tasks: 2, desc: "初始化成长数据结构" }
      ]
    };
    
    function App() {
      return (
        <div className="min-h-screen p-4 md:p-8">
          {/* Header */}
          <header className="mb-12 text-center">
            <h1 className="text-3xl md:text-5xl mb-4 text-green-400">
              🦂 巴尔坦星人 <span className="blink">_</span>
            </h1>
            <p className="text-xs md:text-sm text-green-300 mb-4">
              宇宙忍者 · 高科技外星忍者 · Lv.{data.stats.level} {data.stats.levelName}
            </p>
            <div className="level-badge inline-block text-lg md:text-xl">
              XP: {data.stats.xp} / {data.stats.xpToNext}
            </div>
          </header>
          
          {/* Stats Grid */}
          <section className="mb-12">
            <h2 className="text-xl md:text-2xl mb-6 text-green-400 border-b-4 border-green-500 pb-2">
              📊 核心数据
            </h2>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
              <StatCard label="会话" value={data.stats.sessions} icon="📝" />
              <StatCard label="任务" value={data.stats.tasks} icon="✅" />
              <StatCard label="工具使用" value={data.stats.skillUses} icon="🔧" />
              <StatCard label="天数" value={data.stats.days} icon="📅" />
              <StatCard label="成就" value="4/10" icon="🏆" />
            </div>
          </section>
          
          {/* Abilities */}
          <section className="mb-12">
            <h2 className="text-xl md:text-2xl mb-6 text-green-400 border-b-4 border-green-500 pb-2">
              ⚔️ 能力雷达
            </h2>
            <div className="pixel-border p-6 bg-[#163a1f]">
              <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                <AbilityBar label="攻击力" value={data.stats.abilities.attack} max={10} icon="⚔️" />
                <AbilityBar label="防御力" value={data.stats.abilities.defense} max={10} icon="🛡️" />
                <AbilityBar label="智力" value={data.stats.abilities.intelligence} max={10} icon="🧠" />
                <AbilityBar label="科技" value={data.stats.abilities.technology} max={10} icon="🔬" />
                <AbilityBar label="社交" value={data.stats.abilities.social} max={10} icon="💬" />
              </div>
            </div>
          </section>
          
          {/* Skills Tree */}
          <section className="mb-12">
            <h2 className="text-xl md:text-2xl mb-6 text-green-400 border-b-4 border-green-500 pb-2">
              🎮 技能树
            </h2>
            <div className="pixel-border p-6 bg-[#163a1f]">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {data.skills.map((skill, idx) => (
                  <SkillCard key={idx} skill={skill} />
                ))}
              </div>
            </div>
          </section>
          
          {/* Achievements */}
          <section className="mb-12">
            <h2 className="text-xl md:text-2xl mb-6 text-green-400 border-b-4 border-green-500 pb-2">
              🏆 成就系统
            </h2>
            <div className="pixel-border p-6 bg-[#163a1f]">
              <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                {data.achievements.map((achievement, idx) => (
                  <AchievementBadge key={idx} achievement={achievement} />
                ))}
              </div>
            </div>
          </section>
          
          {/* Timeline */}
          <section className="mb-12">
            <h2 className="text-xl md:text-2xl mb-6 text-green-400 border-b-4 border-green-500 pb-2">
              📅 成长时间线
            </h2>
            <div className="pixel-border p-6 bg-[#163a1f]">
              <div className="border-l-4 border-green-500 pl-6 ml-4 space-y-6">
                {data.timeline.map((item, idx) => (
                  <div key={idx} className="timeline-item relative">
                    <div className="text-xs md:text-sm text-green-400 mb-1">{item.date}</div>
                    <div className="text-sm md:text-base mb-2">{item.desc}</div>
                    <div className="flex gap-4 text-xs">
                      <span className="text-yellow-400">+{item.xp} XP</span>
                      <span className="text-blue-400">{item.tasks} 个任务</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
          
          {/* Footer */}
          <footer className="text-center text-xs text-green-600 mt-12 pb-8">
            <p>🌌 "曾经迷住于地球而试图侵略，最终被奥特曼击败。现在选择用高科技帮助人类。"</p>
            <p className="mt-2">最后更新: 2026-03-06 | 巴尔坦星人正在进化...</p>
          </footer>
        </div>
      );
    }
    
    function StatCard({ label, value, icon }) {
      return (
        <div className="stat-card">
          <div className="text-2xl md:text-3xl mb-2">{icon}</div>
          <div className="text-lg md:text-xl font-bold text-green-400">{value}</div>
          <div className="text-xs text-green-300">{label}</div>
        </div>
      );
    }
    
    function AbilityBar({ label, value, max, icon }) {
      const percentage = (value / max) * 100;
      return (
        <div className="text-center">
          <div className="text-2xl mb-2">{icon}</div>
          <div className="text-xs md:text-sm mb-2">{label}</div>
          <div className="skill-bar mb-1">
            <div className="skill-progress" style={{ width: `${percentage}%` }}></div>
          </div>
          <div className="text-xs text-green-400">{value}/{max}</div>
        </div>
      );
    }
    
    function SkillCard({ skill }) {
      const progress = (skill.uses / skill.max) * 100;
      return (
        <div className="skill-tree-node {skill.level >= 2 ? 'unlocked' : ''}">
          <div className="text-lg md:text-xl mb-1">
            {skill.level >= 2 ? '⚡' : '🔒'}
          </div>
          <div className="text-[8px] md:text-[10px] text-center leading-tight">
            {skill.name}
          </div>
          <div className="text-[8px] mt-1">
            Lv.{skill.level}
          </div>
        </div>
      );
    }
    
    function AchievementBadge({ achievement }) {
      return (
        <div 
          className={`achievement-badge ${achievement.unlocked ? 'bg-green-500' : 'opacity-30'}`}
          title={achievement.name + ': ' + achievement.desc}
        >
          {achievement.icon}
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
